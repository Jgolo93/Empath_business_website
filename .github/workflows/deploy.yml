name: Deploy to Production

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install -r referral-sync/requirements.txt
        
    - name: Run tests (if any)
      run: |
        python -m pytest referral-sync/tests/ -v || true
        
    - name: Deploy to production
      env:
        # Database
        DATABASE_URL: postgresql://neondb_owner:npg_2led5BIEjmnx@ep-misty-resonance-aeq4m318-pooler.c-2.us-east-2.aws.neon.tech/neondb?sslmode=require&channel_binding=require
        
        # Zoho Desk
        ZOHO_ORG_ID: 887430547
        ZOHO_CLIENT_ID: 1000.ABCDEFGHIJKLMNOPQRSTUVWXYZ
        ZOHO_CLIENT_SECRET: abcdefghijklmnopqrstuvwxyz1234567890
        ZOHO_REFRESH_TOKEN: 1000.abcdefghijklmnopqrstuvwxyz1234567890
        ZOHO_API_DOMAIN: https://desk.zoho.com
        
        # Email (Zoho Mail)
